<!DOCTYPE html>
<html>
<head>
    <title>Margin and Padding Demo</title>
    <style>
        .container {
            background-color: lightgray;
            padding: 20px; 
        }

        .box {
            display: inline-block;
            width: 150px;
            background-color: coral;
            border: 3px solid black;

            padding: 15px; 
            margin: 25px;  
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="box">BCA</div>
        <div class="box">BBA</div>
    </div>

</body>
</html>
