<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}


.login-container{
    background:white;
    padding:25px;
    width:300px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);

    display:flex;
    flex-direction:column;
}


.login-container h2{

    text-align:center;
    margin-bottom:15px;
}
.login-container input{
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:4px;
}


.login-container button{
    padding:10px;
    background:#333;
    color:white;
    border:none;
    border-radius:4px;
    cursor:pointer;
}


.login-container p{
    text-align:center;
    margin-top:10px;
}


@media(max-width:600px){
    .login-container{
        width:90%;
    }
}
</style>
</head>

<body>

<div class="login-container">
    <h2>Login</h2>
    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">
    <button type="submit">Login</button>
    <p>Don't have an account?</p>
</div>

</body>
</html>
