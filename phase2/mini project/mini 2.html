<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f4f4f4;
}


.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#333;
    padding:15px;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin:0 10px;
}


.contact{
    display:flex;
    justify-content:center;
    align-items:center;
    height:90vh;
}

form{
    background:white;
    padding:20px;
    width:320px;
    display:flex;
    flex-direction:column;
    border:1px solid #ccc;
}

form h2{
    text-align:center;
    margin-bottom:15px;
}

form input, form textarea{
    margin:10px 0;
    padding:10px;
    border:1px solid #ccc;
}

form button{
    padding:10px;
    background:teal;
    color:white;
    border:none;
}


@media(max-width:600px){
    form{
        width:90%;
    }
}
</style>
</head>

<body>


<div class="navbar">
    <div style="color:white;">MySite</div>
    <div>
        <a href="mini 1.html">Home</a>
        <a href="mini 3.html">sign</a>
    </div>
</div>


<div class="contact">
    <form>
        <h2>Contact Us</h2>
        <input type="text" placeholder="Your Name">
        <input type="email" placeholder="Your Email">
        <textarea rows="4" placeholder="Your Message"></textarea>
        <button type="submit">Send</button>
    </form>
</div>

</body>
</html>
