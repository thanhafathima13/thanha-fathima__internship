<!DOCTYPE html>
<html>
<head>
    <title>Margin vs Padding Example</title>
    <style>
        .box1 {
            background-color: lightblue;
            padding: 20px;   
            margin: 30px;    
            border: 2px solid black;
        }

        .box2 {
            background-color: lightgreen;
            padding: 10px;
            margin: 50px;
            border: 2px solid black;
        }
    </style>
</head>
<body>

    <div class="box1">
        BCA
    </div>

    <div class="box2">
        BBA
    </div>

</body>
</html>
