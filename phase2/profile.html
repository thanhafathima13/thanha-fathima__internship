<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Card</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f0f0f0;
}


.profile{
    width:300px;
    background:rgb(255, 255, 255);
    border:2px solid black;

    margin:50px auto;   
    padding:20px;       
    
    text-align:center;
}


.profile img{
    width:100px;
    height:100px;
    border-radius:50%;
    margin-bottom:15px;   
}


.profile h2{
    margin:10px 0;
}


.profile p{
    padding:10px;      
    background:#e8e8e8;
}
</style>
</head>

<body>

<div class="profile">
    <img src="picture.jpg" alt="Profile">
    <h2>thanha fathima</h2>
    <p>BCA Student</p>
</div>

</body>
</html>
