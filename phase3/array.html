<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Array Display</title>
</head>
<body>

    <h2>Item List</h2>

    <button onclick="showItems()">Show Items</button>

    <ul id="list"></ul>

    <script>
        // Create an array
        let items = ["Apple", "Banana", "Mango", "Orange", "Grapes"];

        function showItems() {
            let list = document.getElementById("list");
            list.innerHTML = ""; // clear old items

            // Loop through array
            for (let i = 0; i < items.length; i++) {
                let li = document.createElement("li");
                li.innerText = items[i];
                list.appendChild(li);
            }
        }
    </script>

</body>
</html>
