<!DOCTYPE html>
<html>
<head>
    <title>Change Style</title>
</head>
<body>

<p id="para">Change my style</p>
<button onclick="styleChange()">Change Style</button>

<script>
function styleChange() {
    let p = document.getElementById("para");
    p.style.color = "red";
    p.style.fontSize = "20px";
}
</script>

</body>
</html>
