<!DOCTYPE html>
<html>
<head>
    <title>Add Element</title>
</head>
<body>

<ul id="list"></ul>
<button onclick="addItem()">Add Item</button>

<script>
function addItem() {
    let li = document.createElement("li");
    li.innerText = "hello";
    document.getElementById("list").appendChild(li);
}
</script>

</body>
</html>
